name: memos-build-pipeline

on:
  push:
    branches: [main] # run when someone pushes to main
  pull_request:
    branches: [main] # run on PRs targeting main
  workflow_dispatch: # manually run from the Github UI

permissions:
  id-token: write    # required for OIDC — lets the workflow request a JWT
  contents: read     # needed for actions/checkout to clone the repo

# What the workflow actualy does
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo # Clones your repo onto the VM that runs this workflow
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/memos_github_role
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Tag Docker image
        run: docker build -t ${{ vars.ECR_REPO }}:${{ github.sha }} -f Dockerfile ./memos

      - name: Push image to ECR
        run: docker push ${{ vars.ECR_REPO }}:${{ github.sha }}

      - name: ECR image scan results
        env:
          ECR_REPO: ${{ vars.ECR_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_NAME="${ECR_REPO##*/}"
          for attempt in {1..12}; do
            if aws ecr wait image-scan-complete \
                --repository-name "$REPO_NAME" --image-id imageTag="$IMAGE_TAG" 2>/dev/null; then
              break
            fi
            echo "Scan not ready yet (attempt $attempt); waiting 10s..."
            sleep 10
          done
          {
            echo "## ECR image scan - \`$IMAGE_TAG\`"
            echo ""
            echo "**Severity counts**"
            echo '```'
            aws ecr describe-image-scan-findings \
              --repository-name "$REPO_NAME" \
              --image-id imageTag="$IMAGE_TAG" \
              --query 'imageScanFindings.findingSeverityCounts' --output table
            echo '```'
            echo "**Findings**"
            echo '```'
            aws ecr describe-image-scan-findings \
              --repository-name "$REPO_NAME" \
              --image-id imageTag="$IMAGE_TAG" \
              --query 'imageScanFindings.findings[].{CVE:name,Severity:severity}' --output table
            echo '```'
            } >> "$GITHUB_STEP_SUMMARY"